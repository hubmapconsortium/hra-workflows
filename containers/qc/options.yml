type: record
name: options
label: qc specific options
fields:
  mtCsv:
    type: File?
    inputBinding:
      prefix: '--mt-csv'
    doc: 'CSV file with mitochondrial gene information.'

  riboCsv:
    type: File?
    inputBinding:
      prefix: '--ribo-csv'
    doc: 'CSV file with ribosomal gene information.'

  ensembleLookup:
    type: File?
    inputBinding:
      prefix: '--ensemble-lookup'
    doc: 'Optional ensemble lookup CSV used to enrich gene metadata before QC.'

  minGenes:
    type: int?
    inputBinding:
      prefix: '--min-genes'
    doc: 'Minimum number of genes per cell.'

  maxGenes:
    type: int?
    inputBinding:
      prefix: '--max-genes'
    doc: 'Maximum number of genes per cell.'

  minCells:
    type: int?
    inputBinding:
      prefix: '--min-cells'
    doc: 'Minimum number of cells required after QC filtering.'

  maxMt:
    type: float?
    inputBinding:
      prefix: '--max-mt'
    doc: 'Maximum percent of mitochondrial gene counts per cell.'

  maxRibo:
    type: float?
    inputBinding:
      prefix: '--max-ribo'
    doc: 'Maximum percent of ribosomal gene counts per cell (optional).'

  filterCells:
    type: boolean?
    inputBinding:
      prefix: '--filter'
    doc: 'If true, writes a filtered .h5ad file with only high-quality cells.'

  logLevel:
    type: int?
    inputBinding:
      prefix: '--log-level'
    doc: 'Numeric logging level (10=DEBUG, 20=INFO, 30=WARNING, etc.).'
